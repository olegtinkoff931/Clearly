<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clearly Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <style>
        /* Убираем все внешние отступы и рамки */
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #111114;
            color: #f0f0f2;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* Главный контейнер на весь экран */
        .app-wrapper {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100%;
            position: relative;
            background: #111114;
        }

        /* Общие стили для экранов (View) */
        .view {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            transition: opacity .4s ease, transform .4s cubic-bezier(.4,0,.2,1);
            background: #111114;
            z-index: 1;
        }

        .view.out-left  { opacity: 0; transform: translateX(-50px); pointer-events: none; }
        .view.out-right { opacity: 0; transform: translateX(50px);  pointer-events: none; }
        .view.hidden    { display: none; }
        .view.active    { opacity: 1; transform: translateX(0); z-index: 2; }

        /* --- ВЕРХНЯЯ ПАНЕЛЬ --- */
        .top-bar { 
            padding: 16px 16px 12px; 
            border-bottom: .5px solid #222228; 
            flex-shrink: 0;
        }
        .header-logo { 
            font-size: 19px; 
            font-weight: 700; 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            margin-bottom: 16px; 
        }
        .header-logo span { 
            background: linear-gradient(135deg,#a78bfa,#818cf8); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }
        
        .quick-access { display: flex; gap: 8px; }
        .qa-btn { 
            flex: 1; 
            background: #1c1c22; 
            border: .5px solid #2e2e38; 
            border-radius: 12px; 
            padding: 10px 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 4px; 
            cursor: pointer; 
        }
        .qa-btn i { font-size: 17px; color: #7c7cdc; }
        .qa-label { font-size: 9px; color: #666; text-transform: uppercase; font-weight: 600; }

        /* --- СПИСОК КАНАЛОВ --- */
        .content-scroll {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 80px; /* место под кнопку и меню */
        }
        .section-title { 
            padding: 18px 16px 8px; 
            font-size: 11px; 
            color: #555; 
            letter-spacing: .8px; 
            text-transform: uppercase; 
        }
        .channel-list { padding: 0 12px; display: flex; flex-direction: column; gap: 10px; }
        
        .channel-card {
            background: #1a1a20; 
            border-radius: 18px; 
            border: .5px solid #2e2e38;
            padding: 14px; 
            display: flex; 
            align-items: center; 
            gap: 12px;
            animation: slideIn .4s ease both;
        }
        @keyframes slideIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

        .indicator { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
        .ind-high { background: #e05252; box-shadow: 0 0 8px #e05252; }
        .ind-mid  { background: #d49a2e; box-shadow: 0 0 8px #d49a2e; }
        .ind-low  { background: #3aaa6e; box-shadow: 0 0 8px #3aaa6e; }

        .chan-info { flex: 1; min-width: 0; }
        .chan-name { font-size: 14px; font-weight: 600; color: #e8e8f0; margin-bottom: 2px; }
        .chan-meta { font-size: 11px; color: #555; }

        .badge { 
            font-size: 9px; 
            padding: 4px 8px; 
            border-radius: 8px; 
            font-weight: 700; 
            text-transform: uppercase;
        }
        .badge-red { background: #2a1010; color: #e05252; border: 0.5px solid #e0525244; }

        .del-btn { background: none; border: none; color: #444; font-size: 16px; padding: 4px; cursor: pointer; }

        /* --- КНОПКИ И НАВИГАЦИЯ --- */
        .add-btn { 
            margin: 16px 12px; 
            background: #5b5bdc; 
            border-radius: 14px; 
            padding: 15px; 
            text-align: center; 
            font-size: 14px; 
            font-weight: 600; 
            color: #fff; 
            cursor: pointer; 
            border: none;
        }

        .nav-bottom { 
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 12px 10px 24px; 
            display: flex; 
            justify-content: space-around; 
            border-top: .5px solid #1e1e26; 
            background: rgba(17, 17, 20, 0.95); 
            backdrop-filter: blur(10px);
            z-index: 10;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 10px; color: #555; }
        .nav-item.active { color: #7c7cdc; }
        .nav-item i { font-size: 20px; }

        /* --- ЭКРАН ПРИВЕТСТВИЯ --- */
        #vSplash { 
            align-items: center; 
            justify-content: center; 
            text-align: center; 
            padding: 24px; 
        }
        .ring { 
            width: 90px; height: 90px; 
            border-radius: 50%; 
            border: 3px solid transparent; 
            background: linear-gradient(#111114,#111114) padding-box, linear-gradient(135deg,#6b6bff,#a78bfa) border-box; 
            display: flex; align-items: center; justify-content: center; 
            margin-bottom: 24px; font-size: 36px; 
        }
        .s-title { font-size: 32px; font-weight: 800; background: linear-gradient(135deg,#a78bfa,#818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .s-btn { 
            margin-top: 40px; 
            background: linear-gradient(135deg,#6b6bff,#a78bfa); 
            color: #fff; border: none; 
            border-radius: 16px; 
            padding: 16px; 
            width: 100%; 
            max-width: 260px;
            font-weight: 600; 
            font-size: 15px;
            cursor: pointer; 
        }
    </style>
</head>
<body>

<div class="app-wrapper">

    <div class="view active" id="vSplash">
        <div class="ring">🔽</div>
        <p class="s-title">Clearly</p>
        <p style="color: #666; margin-top: 10px; font-size: 14px;">All info in one message</p>
        <button class="s-btn" onclick="openMain()">Начать настройку</button>
    </div>

    <div class="view out-right" id="vMain">
        <div class="top-bar">
            <p class="header-logo">🔽 <span>Clearly</span></p>
            <div class="quick-access">
                <div class="qa-btn"><i class="ti ti-user-circle"></i><span class="qa-label">Профиль</span></div>
                <div class="qa-btn"><i class="ti ti-bell"></i><span class="qa-label">Увед-я</span></div>
                <div class="qa-btn"><i class="ti ti-palette"></i><span class="qa-label">Тема</span></div>
                <div class="qa-btn"><i class="ti ti-settings"></i><span class="qa-label">Опции</span></div>
            </div>
        </div>

        <div class="content-scroll">
            <p class="section-title">Мои Twitter каналы</p>
            
            <div class="channel-list">
                <div class="channel-card">
                    <div class="indicator ind-high"></div>
                    <div class="chan-info">
                        <p class="chan-name">@BreakingCrypto</p>
                        <p class="chan-meta">2.1M подписчиков</p>
                    </div>
                    <span class="badge badge-red">Важно</span>
                    <button class="del-btn"><i class="ti ti-trash"></i></button>
                </div>

                <div class="channel-card" style="animation-delay: 0.1s;">
                    <div class="indicator ind-mid"></div>
                    <div class="chan-info">
                        <p class="chan-name">@TechNews</p>
                        <p class="chan-meta">890K подписчиков</p>
                    </div>
                    <button class="del-btn"><i class="ti ti-trash"></i></button>
                </div>
            </div>

            <button class="add-btn" onclick="alert('Добавление...')">+ Добавить новый канал</button>
        </div>

        <div class="nav-bottom">
            <div class="nav-item active"><i class="ti ti-layout-list"></i><span>Каналы</span></div>
            <div class="nav-item"><i class="ti ti-rss"></i><span>Лента</span></div>
            <div class="nav-item"><i class="ti ti-star"></i><span>Избранное</span></div>
            <div class="nav-item"><i class="ti ti-user"></i><span>Аккаунт</span></div>
        </div>
    </div>

</div>

<script>
    const tg = window.Telegram.WebApp;

    // Инициализация
    tg.ready();
    tg.expand(); // Растягиваем на весь экран

    // Настройка цветов под тему Telegram (опционально)
    document.body.style.backgroundColor = '#111114'; 

    function openMain() {
        document.getElementById('vSplash').classList.remove('active');
        document.getElementById('vSplash').classList.add('out-left');
        
        document.getElementById('vMain').classList.remove('out-right');
        document.getElementById('vMain').classList.add('active');
    }
</script>

</body>
</html>
